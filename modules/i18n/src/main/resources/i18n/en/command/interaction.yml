description: "Block, unblock, and enable/disable interactions!"
block:
  description: "Someone being annoying? Block them! You won't receive any interactions from them anymore."
  success:
    title: "Successful Block"
    description: "You'll no longer receive interactions from {user}. You have {count} blocked users. To unblock, type `/interactions unblock`!"
  error:
    title: "Error Blocking User"
    description: "I'm sorry... I wasn't able to remove them from the establishment... try again later?"
  arguments:
    user:
      description: "The user you want to block."
status:
  description: "Enable or disable the ability to send interactions to you!"
  success:
    title: "Interaction Status Changed"
    enabled: "You've changed your interaction status to enabled. Users can now interact with you."
    disabled: "You've changed your interaction status to disabled. Users can no longer interact with you."
  error:
    title: "Error Changing Interaction Status"
    description: "I... don't know why I can't change it right now... try asking me later?"
  arguments:
    status:
      description: "Set to \"true\" to enable interactions."
unblock:
  description: "Unblocks a user you have previously blocked."
  success:
    title: "Unblocked User"
    description: "That user can now interact with you again!"
  error:
    title: "Error Unblocking User"
    description: "I... can't unblock them... please tell my boss..."
  error-invalid:
    title: "Invalid User ID"
    description: "Please only use the user ID that is in the auto complete list!"
  arguments:
    user-id:
      description: "The id of the user you want to unblock."
common:
  footer-suffix: " - Use \"/interaction block\" or \"/interaction status\" to disable interactions!"
  arguments:
    message:
      description: "An optional message to send."
